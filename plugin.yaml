name: visual-test-pro
version: 2.4.0
description: >
  Comprehensive visual browser testing
  with code review, auth handling, magic
  link support, restricted area access,
  smart fix handling with side effect
  warnings, token awareness with options
  and recommendations, plain English
  HTML reports, and an Obsidian Second
  Brain knowledge bridge so findings
  accumulate across runs. Built for solo
  developers and bootstrappers. Works on
  any project globally with one command.
author: Kidkujoe
github: https://github.com/Kidkujoe/Visual-Test-Pro
license: MIT
version_date: 2026-04-22

requires:
  claude_code: ">=2.0.0"
  node: ">=18.0.0"

optional_dependencies:
  chrome: Needed for visual browser testing
  coderabbit_cli: Needed for CodeRabbit sweep
  mailhog: For magic link email catching
  mailpit: Alternative email catcher

commands:
  - name: test
    description: >
      Smart visual browser test with
      project scan, token options menu,
      fix decision flow and plain English
      reporting
    file: commands/test.md

  - name: test-quick
    description: >
      Fast lightweight visual check with
      terminal summary only. Low token cost.
      Good for daily development checks.
    file: commands/test-quick.md

  - name: test-deep
    description: >
      Full comprehensive pre-launch test
      including CodeRabbit sweep and all
      restricted area testing. High token
      cost. Best before major releases.
    file: commands/test-deep.md

  - name: report
    description: >
      Generate or regenerate the plain
      English HTML report from the last
      test session at any time
    file: commands/report.md

  - name: resume
    description: >
      Resume a paused test session or
      continue after granting restricted
      area access
    file: commands/resume.md

  - name: status
    description: >
      Get a snapshot of the current test
      session including progress, issues
      found, fixes applied and token usage
    file: commands/status.md

  - name: edgecases
    description: >
      Analyse the app and discover edge
      cases without running a full test.
      Saves findings for future sessions.
    file: commands/edgecases.md

  - name: pillars
    description: >
      Run the Four Pillars of Production
      Readiness audit. Reliability, Security,
      Scalability, Observability, Design
      and Performance.
    file: commands/pillars.md

  - name: atlas
    description: >
      Master orchestrator and product brain.
      Maps your codebase, catches regressions,
      guards consistency, tells you what to
      do next.
    file: commands/atlas.md

  - name: atlas-quick
    description: >
      Quick Atlas refresh and recommendation.
    file: commands/atlas-quick.md

  - name: atlas-map
    description: >
      Full codebase scan to rebuild the
      product brain map.
    file: commands/atlas-map.md

  - name: atlas-check
    description: >
      Check for regressions and design
      consistency only.
    file: commands/atlas-check.md

  - name: atlas-feature
    description: >
      Post-feature checklist for a specific
      feature with go or no-go verdict.
    file: commands/atlas-feature.md

  - name: design
    description: >
      Full design integrity audit comparing
      features against the established design
      system. Checks colours, typography,
      spacing, components, borders, shadows,
      animations and overall aesthetic fit.
    file: commands/design.md

  - name: copyai
    description: >
      Intelligence-driven copy strategy and
      rewrites. Researches competitors, sources
      real customer language from Reddit, review
      sites and social platforms, builds data-driven
      copy strategy with evidence for every change.
    file: commands/copyai.md

  - name: copyai-research
    description: >
      Research-only Copy Intelligence. Gathers
      competitor and customer intelligence,
      produces strategy without rewrites.
    file: commands/copyai-research.md

  - name: copy
    description: >
      Full copy and brand voice audit.
      Terminology consistency, tone, error
      messages, empty states, marketing vs
      product alignment.
    file: commands/copy.md

  - name: seo
    description: >
      Full SEO audit covering on-page basics,
      semantic HTML, technical SEO, structured
      data and Core Web Vitals.
    file: commands/seo.md

  - name: screenshots
    description: >
      Manage screenshots from all test
      sessions. Delete, archive, or browse
      screenshots by project and session.
    file: commands/screenshots.md

  - name: empathy
    description: >
      Human-centred UX audit using the JOURNEY
      framework. Six user groups, Ghost User
      narratives, emotional arc, trust
      progression, friction map with
      prioritised fixes.
    file: commands/empathy.md

  - name: compass
    description: >
      Product intelligence with PRISM-PV
      framework. Researches competitors,
      mines reviews, scores features,
      produces ranked roadmap with evidence
      and anti-roadmap.
    file: commands/compass.md

  - name: compass-feature
    description: >
      Evaluate a specific feature using
      PRISM-PV. Score, classify and recommend.
    file: commands/compass-feature.md

  - name: compass-project
    description: >
      Full market validation for a new
      project idea before writing code.
    file: commands/compass-project.md

  - name: compass-retro
    description: >
      Retrospective comparing COMPASS
      predictions against actual outcomes.
    file: commands/compass-retro.md

  - name: performance
    description: >
      Real Core Web Vitals, Lighthouse scores,
      bundle analysis, trend tracking.
    file: commands/performance.md

  - name: deploy
    description: >
      Detect deployment platform, trigger
      deploy, verify and rollback on failure.
    file: commands/deploy.md

  - name: ship
    description: >
      Lightweight daily driver for small
      commits. Quick check, commit and push.
    file: commands/ship.md

  - name: deps
    description: >
      Dependency health. Outdated packages,
      abandoned, breaking changes, CVEs.
    file: commands/deps.md

  - name: env-diff
    description: >
      Compare env vars across local and
      production. Names only, never values.
    file: commands/env-diff.md

  - name: migrate
    description: >
      Safe database migration management.
      Classifies operations by risk level.
    file: commands/migrate.md

  - name: review-cycle
    description: >
      Full automated review pipeline.
      Pre-review gates, CodeRabbit review
      with live progress, fix approval,
      PR creation and merge request.
    file: commands/review-cycle.md

  - name: reviews
    description: >
      Branch and review status board.
      Shows all open branches, review
      status, merge blockers, conflicts.
    file: commands/reviews.md

  - name: merge-ready
    description: >
      Check if a branch is ready to merge.
      Runs readiness checks, detects
      conflicts, requests explicit approval.
    file: commands/merge-ready.md

  - name: rollback
    description: >
      Rollback a merged feature if
      post-merge verification fails.
    file: commands/rollback.md

  - name: projects
    description: >
      List all projects that have
      Visual-Test-Pro context data.
      Shows last active, size, and
      atlas status per project.
    file: commands/projects.md

  - name: vtpaudit
    description: >
      Internal audit command. Checks
      all installed command files for
      path isolation violations.
    file: commands/vtpaudit.md

  - name: addaccount
    description: >
      Manually save test account details
      including password and magic link
      settings for any project
    file: commands/addaccount.md

context_files:
  - path: context/report-template.html
    description: HTML report template
    install_to: ~/.claude/context/
  - path: context/test-session.md
    description: Session memory file
    install_to: ~/.claude/context/
  - path: context/test-accounts.md
    description: Test account storage
    install_to: ~/.claude/context/
  - path: context/test-data.json
    description: Test findings data store
    install_to: ~/.claude/context/
